name: Deploy Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      update_data:
        description: Run updates:maintenance before building
        type: boolean
        default: true

  schedule:
    # Daily, UTC. Avoid top-of-hour because GitHub scheduled jobs can be delayed there.
    - cron: "37 4 * * *"

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Update source data
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.update_data)
        run: yarn updates:maintenance

      - name: Build
        run: yarn build --base=/${{ github.event.repository.name }}/

      - name: Disable Jekyll
        run: touch local-dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: local-dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4